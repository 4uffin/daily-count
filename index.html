<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Entry Log</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            background-color: #f9f9f9;
        }
        h1 {
            color: #333;
        }
    </style>
</head>
<body>
    <h1>Most Recent Daily Entry Log</h1>
    <div id="log-content">
        <!-- Daily entry log will be displayed here -->
    </div>
    <script>
        fetch('daily_logs/recent_entry.txt')
            .then(response => response.text())
            .then(data => {
                document.getElementById('log-content').innerText = data;
            })
            .catch(error => {
                document.getElementById('log-content').innerText = 'Error loading the log.';
            });
    </script>
</body>
</html>
