<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latest Daily Log</title>
</head>
<body>
    <h1>Most Recent Daily Log</h1>
    <div id="log-content"></div>

    <script>
        async function fetchLatestLog() {
            try {
                const response = await fetch('https://api.example.com/daily_logs'); // Update with real API endpoint
                const logs = await response.json();
                const latestLog = logs[logs.length - 1]; // Assuming logs are sorted by date

                document.getElementById('log-content').innerHTML = `<h2>Day: ${latestLog.day_number}</h2>\n` +
                    `<p>Date: ${latestLog.date}</p>\n` +
                    `<p>Status: ${latestLog.status}</p>`;
            } catch (error) {
                console.error('Error fetching the latest log:', error);
                document.getElementById('log-content').innerHTML = '<p>Error loading log data.</p>';
            }
        }

        fetchLatestLog();
    </script>
</body>
</html>
